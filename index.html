<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trader Scanner</title>

<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>
:root{
--bg:#060a12;
--surface:#0d1320;
--surface2:#111c2e;
--border:#1a2740;
--text:#e8eef8;
--muted:#7b8aa6;
--gold:#f0b90b;
--green:#00e676;
--red:#ff4d67;
--blue:#2979ff;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
background:var(--bg);
color:var(--text);
font-family:'DM Sans',sans-serif;
}

/* HEADER */
.header{
position:sticky;
top:0;
z-index:100;
display:flex;
align-items:center;
justify-content:space-between;
padding:14px 16px;
background:rgba(6,10,18,.96);
border-bottom:1px solid var(--border);
}

.header-left{display:flex;align-items:center;gap:12px;}

.menu-btn{
font-size:1.4rem;
cursor:pointer;
background:none;
border:none;
color:var(--text);
}

.logo{font-weight:700;font-size:1rem;}

/* DROPDOWN */
.dropdown{
position:absolute;
top:65px;
left:14px;
width:320px;
background:var(--surface);
border:1px solid var(--border);
border-radius:16px;
padding:14px;
display:none;
max-height:400px;
overflow-y:auto;
transform:translateY(-10px);
transition:.3s ease;
}

.dropdown.open{
display:block;
transform:translateY(0);
}

.menu-title{
font-size:.72rem;
color:var(--muted);
margin:10px 0;
font-family:'Space Mono',monospace;
}

.menu-item{
background:var(--surface2);
padding:10px;
border-radius:10px;
margin-bottom:8px;
font-family:'Space Mono',monospace;
display:flex;
justify-content:space-between;
cursor:pointer;
}

/* CONTAINER */
.container{
max-width:900px;
margin:auto;
padding:16px;
padding-bottom:90px;
}

.card{
background:var(--surface);
border:1px solid var(--border);
border-radius:18px;
padding:16px;
margin-bottom:16px;
}

.title{
font-size:.72rem;
color:var(--muted);
margin-bottom:10px;
font-family:'Space Mono',monospace;
}

/* SIGNAL */
.signal{
background:var(--surface2);
padding:18px;
border-radius:16px;
border-left:4px solid var(--green);
font-family:'Space Mono',monospace;
cursor:pointer;
}

.signal.short{border-left-color:var(--red);}

.badge{
display:inline-block;
padding:6px 12px;
border-radius:20px;
font-size:.7rem;
margin:10px 0;
font-weight:700;
}

.long{background:rgba(0,230,118,.12);color:var(--green);}
.short{background:rgba(255,77,103,.12);color:var(--red);}

/* GRID */
.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-top:10px;
}

.box{
background:var(--bg);
padding:10px;
border-radius:10px;
border:1px solid var(--border);
text-align:center;
font-size:.75rem;
}

/* POPUP */
.popup{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:var(--surface);
padding:18px;
border-radius:14px;
border:1px solid var(--border);
display:none;
width:300px;
z-index:200;
}

.popup.show{display:block;}

.overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,.6);
display:none;
z-index:199;
}

.overlay.show{display:block;}

/* TRADERS */
.traders a{
display:block;
padding:10px;
margin:6px 0;
background:var(--surface2);
border-radius:10px;
color:var(--text);
text-decoration:none;
font-family:'Space Mono';
}

/* FAUCET */
.faucet{
text-align:center;
background:linear-gradient(135deg,#0d1a10,#0d1320);
}

button{
padding:8px;
border:none;
background:var(--blue);
color:white;
border-radius:8px;
cursor:pointer;
}
</style>
</head>

<body>

<div class="header">
  <div class="header-left">
    <button class="menu-btn" onclick="toggleMenu()">☰</button>
    <div class="logo">Trader Scanner</div>
  </div>
</div>

<!-- MENU -->
<div class="dropdown" id="menu"></div>

<div class="container">

<!-- BEST SIGNAL -->
<div class="card">
<div class="title">BEST TRADE SIGNAL</div>
<div id="signal"></div>
</div>

<!-- TRADERS -->
<div class="card traders">
<div class="title">TOP CRYPTO TRADERS</div>
<a href="#">@TraderAlpha</a>
<a href="#">@CryptoKing</a>
<a href="#">@SignalPro</a>
</div>

<!-- FAUCET -->
<div class="card faucet">
<div class="title">EARN FREE CRYPTO</div>
<p>⭐ 4.6 Rating</p>
<a href="https://faucetcrypto.com/r/4202112" target="_blank">
<button>Claim Crypto</button>
</a>
</div>

</div>

<!-- POPUP -->
<div class="overlay" id="overlay" onclick="closePopup()"></div>
<div class="popup" id="popup"></div>

<script>

let coins=[];

/* MENU */
function toggleMenu(){
document.getElementById("menu").classList.toggle("open");
}

/* FETCH */
async function load(){
let res=await fetch("https://api.binance.com/api/v3/ticker/24hr");
coins=await res.json();

coins=coins.filter(c=>c.symbol.endsWith("USDT"));

buildMenu();
bestSignal();
}

/* SCORING ENGINE */
function score(c){
let volume=parseFloat(c.quoteVolume);
let momentum=parseFloat(c.priceChangePercent);
let high=parseFloat(c.highPrice);
let low=parseFloat(c.lowPrice);
let price=parseFloat(c.lastPrice);

let volatility=(high-low)/price*100;

let trend=Math.abs(momentum);

return (volume/1e9)*0.3 + trend*0.4 + volatility*0.3;
}

/* BEST SIGNAL */
function bestSignal(){
coins.sort((a,b)=>score(b)-score(a));

let c=coins[0];
let change=parseFloat(c.priceChangePercent);

let type=change>0?"LONG":"SHORT";

document.getElementById("signal").innerHTML=`
<div class="signal ${type==="SHORT"?"short":""}" onclick='openPopup("${c.symbol}")'>
<div style="font-weight:700">${c.symbol}</div>

<div class="badge ${type==="LONG"?"long":"short"}">${type}</div>

<div class="grid">
<div class="box">Entry<br>${c.lastPrice}</div>
<div class="box">Change<br>${change.toFixed(2)}%</div>
</div>
</div>`;
}

/* MENU BUILD */
function buildMenu(){

let sorted=[...coins].sort((a,b)=>parseFloat(b.priceChangePercent)-parseFloat(a.priceChangePercent));

let bullish=sorted.filter(c=>parseFloat(c.priceChangePercent)>0).slice(0,5);
let bearish=sorted.filter(c=>parseFloat(c.priceChangePercent)<0).slice(0,5);
let early=sorted.filter(c=>parseFloat(c.priceChangePercent)>2).slice(0,5);

document.getElementById("menu").innerHTML=`
<div class="menu-title">Bullish</div>
${bullish.map(c=>item(c,"↑")).join("")}

<div class="menu-title">Bearish</div>
${bearish.map(c=>item(c,"↓")).join("")}

<div class="menu-title">Early Detection</div>
${early.map(c=>item(c,"🚀")).join("")}
`;
}

function item(c,icon){
return `<div class="menu-item" onclick="openPopup('${c.symbol}')">
<span>${c.symbol} ${icon}</span>
<span>${parseFloat(c.priceChangePercent).toFixed(2)}%</span>
</div>`;
}

/* POPUP */
function openPopup(sym){
let c=coins.find(x=>x.symbol===sym);
if(!c)return;

document.getElementById("popup").innerHTML=`
<h3>${c.symbol}</h3>
<p>Price: ${c.lastPrice}</p>
<p>Change: ${c.priceChangePercent}%</p>
<p>Volume: ${parseFloat(c.quoteVolume).toLocaleString()}</p>
<p>Trend Strength: ${(Math.abs(c.priceChangePercent)).toFixed(2)}</p>
`;

document.getElementById("popup").classList.add("show");
document.getElementById("overlay").classList.add("show");
}

function closePopup(){
document.getElementById("popup").classList.remove("show");
document.getElementById("overlay").classList.remove("show");
}

/* INIT */
load();
setInterval(load,300000);

</script>

</body>
</html>
