
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trader Scanner Pro</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

<style>
body{
margin:0;
background:#070b14;
color:#e9eefc;
font-family:DM Sans;
}

.header{
display:flex;
justify-content:space-between;
padding:14px;
background:#0b1220;
position:sticky;
top:0;
border-bottom:1px solid #1d2a44;
}

.card{
background:#0e1626;
margin:12px;
padding:14px;
border-radius:14px;
border:1px solid #1d2a44;
}

.title{
font-size:.75rem;
color:#7d8aa6;
margin-bottom:10px;
}

.signal{
font-family:Space Mono;
padding:14px;
border-radius:12px;
background:#121c2f;
border-left:4px solid #00e676;
}

.badge{
display:inline-block;
padding:6px 10px;
border-radius:20px;
font-size:.7rem;
margin-top:8px;
}

.long{background:rgba(0,230,118,.15);color:#00e676;}
.short{background:rgba(255,77,103,.15);color:#ff4d67;}
.cons{background:rgba(240,185,11,.15);color:#f0b90b;}

.btn{
background:#f0b90b;
color:#000;
padding:10px 14px;
border-radius:10px;
text-decoration:none;
display:inline-block;
margin-top:10px;
font-weight:700;
}

.timer{
font-family:Space Mono;
font-size:.85rem;
margin-top:8px;
color:#7d8aa6;
}

</style>
</head>

<body>

<div class="header">
<div>⚡ Trader Scanner Pro</div>
<div id="countdown">05:00</div>
</div>

<!-- BEST SIGNAL -->
<div class="card">
<div class="title">BEST TRADE SIGNAL</div>
<div id="signal">Loading...</div>
<div class="timer">Auto refresh every 5 minutes</div>
</div>

<!-- FAUCET -->
<div class="card">
<div class="title">EARN FREE CRYPTO</div>
<div>⭐ 4.6 Rating</div>
<a class="btn" href="https://faucetcrypto.com/r/4202112" target="_blank">Claim Crypto</a>
</div>

<script>

let coins = [];
let timer = 300; // 5 minutes

/* FORCE FRESH DATA (FIXED CACHE BUG) */
async function fetchCoins(){
try{
let res = await fetch(
"https://api.binance.com/api/v3/ticker/24hr?t=" + Date.now(),
{cache:"no-store"}
);

let data = await res.json();

coins = data
.filter(c=>c.symbol.endsWith("USDT"))
.sort((a,b)=>
Math.abs(parseFloat(b.priceChangePercent)) -
Math.abs(parseFloat(a.priceChangePercent))
);

bestSignal();

}catch(e){
console.log(e);
}
}

/* SMART SIGNAL + CONSOLIDATION LOGIC */
function bestSignal(){

if(!coins.length) return;

let best = coins[0];

let change = parseFloat(best.priceChangePercent);
let price = parseFloat(best.lastPrice);
let vol = parseFloat(best.quoteVolume);

/* CONSOLIDATION RULE */
let isConsolidating = Math.abs(change) < 1.2 && vol < 2e8;

let type = "";

if(isConsolidating){
type = "CONSOLIDATION";
} else {
type = change > 0 ? "LONG" : "SHORT";
}

document.getElementById("signal").innerHTML = `
<div class="signal">

<div style="font-weight:700">${best.symbol}</div>

<div class="badge ${type==='LONG'?'long':type==='SHORT'?'short':'cons'}">
${type}
</div>

<div style="margin-top:10px;font-family:Space Mono">
Entry: ${price.toFixed(4)}<br>
SL: ${(price*0.98).toFixed(4)}<br>
TP: ${(price*1.03).toFixed(4)}<br>
Volume: ${formatVol(vol)} USDT<br>
Change: ${change.toFixed(2)}%
</div>

</div>
`;
}

/* VOLUME FORMAT FIX */
function formatVol(v){
v = Number(v);
if(v>=1e9) return (v/1e9).toFixed(2)+"B";
if(v>=1e6) return (v/1e6).toFixed(2)+"M";
return v.toFixed(0);
}

/* COUNTDOWN ENGINE (FIXED REFRESH SYSTEM) */
function startCountdown(){

setInterval(()=>{

timer--;

let m = Math.floor(timer/60);
let s = timer%60;

document.getElementById("countdown").innerText =
String(m).padStart(2,"0")+":"+String(s).padStart(2,"0");

/* WHEN TIMER ENDS → REFRESH DATA */
if(timer<=0){
timer = 300;
fetchCoins();
}

},1000);

}

/* INIT */
fetchCoins();
startCountdown();

</script>

</body>
</html>
