
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trader Scanner Institutional</title>

<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root{
--bg:#05070d;
--surface:#0b1220;
--surface2:#111a2e;
--border:#1a2a45;
--text:#e8eef8;
--muted:#7a8aa5;
--green:#00e676;
--red:#ff4d67;
--blue:#3b82f6;
--gold:#f0b90b;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
background:var(--bg);
color:var(--text);
font-family:'DM Sans',sans-serif;
}

/* HEADER */
.header{
position:sticky;
top:0;
z-index:100;
display:flex;
justify-content:space-between;
align-items:center;
padding:14px;
background:rgba(5,7,13,.95);
border-bottom:1px solid var(--border);
backdrop-filter:blur(10px);
}

.menu-btn{
background:none;
border:none;
color:var(--text);
font-size:1.4rem;
cursor:pointer;
}

/* MENU */
.menu{
position:absolute;
top:60px;
left:12px;
width:360px;
max-height:70vh;
overflow-y:auto;
background:var(--surface);
border:1px solid var(--border);
border-radius:14px;
padding:12px;
display:none;
animation:slide .25s ease;
}

.menu.open{display:block;}

@keyframes slide{
from{transform:translateY(-10px);opacity:0}
to{transform:translateY(0);opacity:1}
}

.section-title{
font-size:.7rem;
color:var(--muted);
margin:10px 0 6px;
}

.item{
display:flex;
justify-content:space-between;
padding:10px;
background:var(--surface2);
border-radius:10px;
margin-bottom:6px;
font-family:'Space Mono';
font-size:.75rem;
}

/* CONTAINER */
.container{
max-width:900px;
margin:auto;
padding:16px;
}

/* SIGNAL */
.signal{
background:var(--surface);
border:1px solid var(--border);
border-radius:16px;
padding:16px;
border-left:4px solid var(--blue);
font-family:'Space Mono';
}

.badge{
padding:4px 10px;
border-radius:20px;
display:inline-block;
font-size:.7rem;
margin:8px 0;
}

.long{background:rgba(0,230,118,.15);color:var(--green);}
.short{background:rgba(255,77,103,.15);color:var(--red);}

/* GRID */
.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-top:12px;
}

.box{
background:var(--surface2);
padding:10px;
border-radius:10px;
border:1px solid var(--border);
font-family:'Space Mono';
}

.label{font-size:.6rem;color:var(--muted)}
.value{font-size:.85rem;margin-top:4px}

</style>
</head>

<body>

<div class="header">
<button class="menu-btn" onclick="toggleMenu()">☰</button>
<div>INSTITUTIONAL SCANNER</div>
</div>

<div class="menu" id="menu">

<div class="section-title">🧠 SMART MONEY FLOW</div>
<div id="smart"></div>

<div class="section-title">🐋 LIQUIDITY / WHALES</div>
<div id="whales"></div>

<div class="section-title">🚀 BREAKOUT ZONES</div>
<div id="breakout"></div>

</div>

<div class="container">

<div class="signal">
<div id="signal">Loading institutional signal...</div>
</div>

</div>

<script>

let coins=[];

function toggleMenu(){
document.getElementById("menu").classList.toggle("open");
}

/* FORMAT VOLUME */
function fmt(v){
if(v>1e9) return (v/1e9).toFixed(2)+"B";
if(v>1e6) return (v/1e6).toFixed(2)+"M";
if(v>1e3) return (v/1e3).toFixed(1)+"K";
return v;
}

/* FETCH */
async function load(){
let r = await fetch("https://api.binance.com/api/v3/ticker/24hr");
let d = await r.json();

coins = d.filter(c=>c.symbol.endsWith("USDT"));
process();
}

/* INSTITUTIONAL ENGINE */
function process(){

coins.forEach(c=>{
c.volatility = Math.abs(c.priceChangePercent);
c.volumeScore = c.volume/1000000;
c.sweep = c.highPrice - c.lowPrice;
});

/* SORT BY SMART MONEY SCORE */
coins.sort((a,b)=>
(b.volatility*0.6 + b.volumeScore*0.4) -
(a.volatility*0.6 + a.volumeScore*0.4)
);

let best = coins[0];
let price = parseFloat(best.lastPrice);
let ch = parseFloat(best.priceChangePercent);

/* INSTITUTIONAL SCORE MODEL */
let score =
(Math.abs(ch)*0.7) +
(best.volume/1e6)*0.3 +
(Math.abs(best.highPrice-best.lowPrice)/price)*10;

let type = ch>0?"LONG":"SHORT";

/* SIGNAL */
document.getElementById("signal").innerHTML=`
<div style="font-size:1rem">${best.symbol}</div>

<div class="badge ${type==="LONG"?"long":"short"}">${type} SIGNAL</div>

<div class="grid">
<div class="box"><div class="label">ENTRY</div><div class="value">${price.toFixed(4)}</div></div>
<div class="box"><div class="label">SL</div><div class="value">${(price*0.98).toFixed(4)}</div></div>
<div class="box"><div class="label">TP</div><div class="value">${(price*1.03).toFixed(4)}</div></div>
<div class="box"><div class="label">SCORE</div><div class="value">${score.toFixed(2)}/10</div></div>
</div>
`;

/* SMART MONEY */
let smart = [...coins].slice(0,5);

document.getElementById("smart").innerHTML =
smart.map(c=>`
<div class="item">
<span>${c.symbol}</span>
<span>${c.priceChangePercent}%</span>
</div>
`).join("");

/* WHALES */
let whales = [...coins].filter(c=>c.volume>2000000).slice(0,5);

document.getElementById("whales").innerHTML =
whales.map(c=>`
<div class="item">
<span>${c.symbol}</span>
<span>🐋 ${fmt(c.volume)}</span>
</div>
`).join("");

/* BREAKOUT */
let breakout = [...coins].filter(c=>Math.abs(c.priceChangePercent)>3).slice(0,5);

document.getElementById("breakout").innerHTML =
breakout.map(c=>`
<div class="item">
<span>${c.symbol}</span>
<span>🚀</span>
</div>
`).join("");

}

/* LIVE UPDATE (NO REFRESH LOOP LIKE BEFORE) */
load();
setInterval(load, 120000);

</script>

</body>
</html>
