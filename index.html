<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trader Scanner</title>

<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>
:root{
    --bg:#060a12;
    --surface:#0d1320;
    --surface2:#111c2e;
    --border:#1a2740;
    --text:#e8eef8;
    --muted:#7b8aa6;
    --gold:#f0b90b;
    --green:#00e676;
    --red:#ff4d67;
    --blue:#2979ff;
    --yellow:#ffd600;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
    background:var(--bg);
    color:var(--text);
    font-family:'DM Sans',sans-serif;
}

.container{max-width:900px;margin:auto;padding:16px;}

/* HEADER */
.header{
    position:sticky;
    top:0;
    background:rgba(6,10,18,.95);
    backdrop-filter:blur(10px);
    border-bottom:1px solid var(--border);
    padding:14px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.badge{
    font-size:.7rem;
    padding:5px 10px;
    border-radius:20px;
    border:1px solid var(--border);
    background:var(--surface2);
}

/* CARD */
.card{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:16px;
    padding:16px;
    margin-bottom:14px;
}

.title{
    font-size:.75rem;
    color:var(--muted);
    font-family:'Space Mono',monospace;
    margin-bottom:10px;
}

/* SIGNAL */
.signal{
    padding:16px;
    border-radius:14px;
    background:var(--surface2);
    border-left:4px solid var(--gold);
}

.signal.long{border-left-color:var(--green);}
.signal.short{border-left-color:var(--red);}

.row{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;}

.box{
    font-size:.75rem;
    padding:5px 8px;
    border-radius:8px;
    background:var(--surface);
    border:1px solid var(--border);
    font-family:'Space Mono',monospace;
}

/* SCALPER */
.scalper{
    display:grid;
    gap:8px;
}

.scalp-item{
    display:flex;
    justify-content:space-between;
    padding:10px;
    background:var(--surface2);
    border-radius:10px;
    font-size:.8rem;
    font-family:'Space Mono';
}

/* BUTTON */
.btn{
    background:var(--blue);
    border:none;
    padding:10px 14px;
    border-radius:10px;
    color:white;
    cursor:pointer;
}

/* FAUCET */
.faucet{
    text-align:center;
    padding:14px;
    background:linear-gradient(135deg,#0d1a10,#0d1320);
    border:1px solid rgba(0,230,118,.2);
    border-radius:14px;
}

a{
    color:inherit;
    text-decoration:none;
    font-weight:700;
    display:inline-block;
    margin-top:10px;
    background:var(--gold);
    padding:12px;
    border-radius:10px;
    color:#000;
}
</style>
</head>

<body>

<div class="header">
    <div>⚡ Trader Scanner</div>
    <div class="badge">LIVE</div>
</div>

<div class="container">

<!-- BEST SIGNAL -->
<div class="card">
<div class="title">BEST TRADE SIGNAL</div>

<div id="signalBox">
Loading...
</div>

</div>

<!-- SCALPER COINS -->
<div class="card">
<div class="title">SCALPER COINS (SHORT TERM)</div>

<div class="scalper" id="scalper">
</div>

</div>

<!-- FAUCET -->
<div class="card faucet">
<div class="title">EARN FREE CRYPTO</div>

<div style="font-size:.8rem;color:var(--muted)">
Rating: ⭐ 4.6 / 5 (2,800+ users)
</div>

<a href="https://faucetcrypto.com/r/4202112" target="_blank">
Claim Free Crypto
</a>

</div>

</div>

<script>

let coins=["BTCUSDT","ETHUSDT","BNBUSDT","SOLUSDT","XRPUSDT","DOGEUSDT","ADAUSDT"];

async function getPrice(symbol){
    const r=await fetch(`https://api.binance.com/api/v3/ticker/24hr?symbol=${symbol}`);
    return await r.json();
}

async function bestSignal(){

    let best=null;

    for(let c of coins){

        try{

            let d=await getPrice(c);

            let change=parseFloat(d.priceChangePercent);

            let score=Math.abs(change);

            let type=change>0?"LONG":"SHORT";

            if(!best || score>best.score){

                best={
                    symbol:c,
                    type,
                    price:d.lastPrice,
                    change,
                    score
                };
            }

        }catch(e){}
    }

    document.getElementById("signalBox").innerHTML=`
        <div class="signal ${best.type.toLowerCase()}">

            <div><b>${best.symbol}</b></div>

            <div class="row">
                <div class="box">Entry: ${best.price}</div>
                <div class="box">SL: ${(best.price*0.98).toFixed(2)}</div>
                <div class="box">TP: ${(best.price*1.03).toFixed(2)}</div>
            </div>

            <div style="margin-top:10px;font-size:.8rem">
                Confidence: ${best.score.toFixed(2)}%
            </div>

        </div>
    `;
}

async function scalpers(){

    let list=[];

    for(let c of coins.slice(0,6)){

        try{
            let d=await getPrice(c);

            list.push(`
                <div class="scalp-item">
                    <span>${c}</span>
                    <span>${parseFloat(d.priceChangePercent).toFixed(2)}%</span>
                </div>
            `);

        }catch(e){}
    }

    document.getElementById("scalper").innerHTML=list.join("");
}

bestSignal();
scalers=()=>{};
scalpers();

setInterval(bestSignal,300000);
setInterval(scalpers,300000);

</script>

</body>
</html>
